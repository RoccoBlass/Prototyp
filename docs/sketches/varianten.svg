<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <style>
    .frame { fill:#ffffff; stroke:#94a3b8; stroke-width:2; }
    .bar   { fill:#e2e8f0; }
    .box   { fill:#f1f5f9; stroke:#cbd5e1; stroke-width:1.5; }
    .btn   { fill:#16a34a; }
    .pill  { fill:#dcfce7; stroke:#16a34a; stroke-width:1.5; }
    .t     { fill:#334155; font-size:13px; }
    .tt    { fill:#0f172a; font-size:14px; font-weight:700; }
    .tw    { fill:#ffffff; font-size:13px; font-weight:700; }
    .cap   { fill:#0f172a; font-size:15px; font-weight:700; }
    .sub   { fill:#64748b; font-size:12px; }
    .plus  { fill:#16a34a; font-size:18px; font-weight:700; }
    .chosen{ fill:none; stroke:#16a34a; stroke-width:3; stroke-dasharray:6 5; }
  </style>

  <text x="480" y="28" text-anchor="middle" class="cap">Skizzen – drei Lösungsvarianten (schematische Wireframes)</text>

  <!-- (a) Formular pro Mahlzeit -->
  <g transform="translate(30,55)">
    <rect class="frame" width="270" height="470" rx="20"/>
    <rect class="bar" x="14" y="16" width="242" height="34" rx="8"/>
    <text x="26" y="38" class="tt">Mahlzeit erfassen</text>
    <text x="20" y="78" class="sub">Name</text>
    <rect class="box" x="18" y="86" width="234" height="34" rx="8"/>
    <text x="20" y="142" class="sub">Kalorien</text>
    <rect class="box" x="18" y="150" width="234" height="34" rx="8"/>
    <text x="20" y="206" class="sub">Protein / KH / Fett</text>
    <rect class="box" x="18" y="214" width="72" height="34" rx="8"/>
    <rect class="box" x="99" y="214" width="72" height="34" rx="8"/>
    <rect class="box" x="180" y="214" width="72" height="34" rx="8"/>
    <rect class="btn" x="18" y="276" width="234" height="40" rx="10"/>
    <text x="135" y="301" text-anchor="middle" class="tw">Speichern</text>
    <text x="135" y="360" text-anchor="middle" class="sub">… jede Mahlzeit neu eintippen</text>
  </g>
  <text x="165" y="552" text-anchor="middle" class="cap">(a) Formular pro Mahlzeit</text>
  <text x="165" y="572" text-anchor="middle" class="sub">verworfen: wiederholte Eingabearbeit</text>

  <!-- (b) Wiederverwendbare Mahlzeiten + Tap-to-Log (gewählt) -->
  <g transform="translate(345,55)">
    <rect class="chosen" x="-6" y="-6" width="282" height="482" rx="24"/>
    <rect class="frame" width="270" height="470" rx="20"/>
    <rect class="bar" x="14" y="16" width="242" height="34" rx="8"/>
    <text x="26" y="38" class="tt">Meine Mahlzeiten</text>
    <g transform="translate(18,68)">
      <rect class="box" width="234" height="50" rx="10"/>
      <text x="14" y="22" class="t">Protein-Porridge</text>
      <text x="14" y="40" class="sub">413 kcal</text>
      <circle class="pill" cx="208" cy="25" r="16"/><text x="208" y="31" text-anchor="middle" class="plus">+</text>
    </g>
    <g transform="translate(18,128)">
      <rect class="box" width="234" height="50" rx="10"/>
      <text x="14" y="22" class="t">Hähnchen mit Reis</text>
      <text x="14" y="40" class="sub">645 kcal</text>
      <circle class="pill" cx="208" cy="25" r="16"/><text x="208" y="31" text-anchor="middle" class="plus">+</text>
    </g>
    <g transform="translate(18,188)">
      <rect class="box" width="234" height="50" rx="10"/>
      <text x="14" y="22" class="t">Magerquark + Banane</text>
      <text x="14" y="40" class="sub">210 kcal</text>
      <circle class="pill" cx="208" cy="25" r="16"/><text x="208" y="31" text-anchor="middle" class="plus">+</text>
    </g>
    <rect class="btn" x="18" y="256" width="234" height="40" rx="10"/>
    <text x="135" y="281" text-anchor="middle" class="tw">+ Neue Mahlzeit</text>
    <text x="135" y="340" text-anchor="middle" class="sub">1 Tap → für heute erfasst</text>
  </g>
  <text x="480" y="552" text-anchor="middle" class="cap">(b) Wiederverwendbare Mahlzeiten · Tap-to-Log</text>
  <text x="480" y="572" text-anchor="middle" class="sub">gewählt: minimaler Aufwand, hohe Wiederverwendung</text>

  <!-- (c) Tagesplan mit Slots -->
  <g transform="translate(660,55)">
    <rect class="frame" width="270" height="470" rx="20"/>
    <rect class="bar" x="14" y="16" width="242" height="34" rx="8"/>
    <text x="26" y="38" class="tt">Heute</text>
    <g transform="translate(18,70)">
      <rect class="box" width="234" height="46" rx="10"/>
      <text x="14" y="28" class="t">Frühstück</text>
      <circle class="pill" cx="208" cy="23" r="15"/><text x="208" y="29" text-anchor="middle" class="plus">+</text>
    </g>
    <g transform="translate(18,126)">
      <rect class="box" width="234" height="46" rx="10"/>
      <text x="14" y="28" class="t">Mittagessen</text>
      <circle class="pill" cx="208" cy="23" r="15"/><text x="208" y="29" text-anchor="middle" class="plus">+</text>
    </g>
    <g transform="translate(18,182)">
      <rect class="box" width="234" height="46" rx="10"/>
      <text x="14" y="28" class="t">Abendessen</text>
      <circle class="pill" cx="208" cy="23" r="15"/><text x="208" y="29" text-anchor="middle" class="plus">+</text>
    </g>
    <g transform="translate(18,238)">
      <rect class="box" width="234" height="46" rx="10"/>
      <text x="14" y="28" class="t">Snack</text>
      <circle class="pill" cx="208" cy="23" r="15"/><text x="208" y="29" text-anchor="middle" class="plus">+</text>
    </g>
    <text x="135" y="330" text-anchor="middle" class="sub">feste Slots je Tag</text>
  </g>
  <text x="795" y="552" text-anchor="middle" class="cap">(c) Tagesplan mit festen Slots</text>
  <text x="795" y="572" text-anchor="middle" class="sub">verworfen: bildet variable Esstypen schlecht ab</text>
</svg>
